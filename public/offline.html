<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Puzzroo</title>
  <style>
    body {
      background-color: #181A20;
      color: #FAFAFA;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #1F222A;
      border: 2px solid #6949FF;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      box-shadow: 0 10px 25px rgba(105, 73, 255, 0.15);
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin: 0;
      color: #FFFFFF;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #BDBDBD;
      margin: 0;
    }
    .btn {
      width: 100%;
      height: 48px;
      background-color: #6949FF;
      color: #FFFFFF;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(105, 73, 255, 0.3);
    }
    .btn:hover {
      background-color: #5536E6;
    }
    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/logo-icon.svg" alt="Puzzroo" width="50" height="50" />
    </div>
    <h1>You're Offline</h1>
    <p>It seems you are not connected to the internet. Please check your network settings and try again to continue solving your puzzles.</p>
    <button class="btn" onclick="window.location.reload()">
      Retry Connection
    </button>
  </div>
</body>
</html>
